project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - quick-start.qmd
    - usage.md
    - architecture.md
    - data_provenance.md
    - docie_pipeline.md
    - sample_document_corpus.md
    - how-to/launch-quarto-site.qmd
    - notebooks/index.qmd
    - notebooks/*.ipynb

website:
  title: "smol-doc-analyzer"
  description: "Local insurance document classification, extraction, and memo generation"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: quick-start.qmd
        text: Quick Start
      - href: usage.md
        text: Usage
      - href: architecture.md
        text: Architecture
      - text: Pipelines
        menu:
          - href: docie_pipeline.md
            text: DICIE Pipeline
          - href: sample_document_corpus.md
            text: Sample Corpus
      - href: data_provenance.md
        text: Data Provenance
      - href: notebooks/index.qmd
        text: Notebooks
      - href: how-to/launch-quarto-site.qmd
        text: How-to
  page-footer:
    left: "smol-doc-analyzer · local insurance document pipeline"
    right: "Synthetic data only · no real insurer data"
  sidebar:
    - title: "Guides"
      contents:
        - index.qmd
        - quick-start.qmd
        - usage.md
        - architecture.md
        - how-to/launch-quarto-site.qmd
    - title: "Pipelines"
      contents:
        - docie_pipeline.md
        - sample_document_corpus.md
        - data_provenance.md
    - title: "Notebooks"
      contents:
        - notebooks/index.qmd
        - notebooks/pipeline_walkthrough.ipynb
        - notebooks/docie_pipeline_walkthrough.ipynb
        - notebooks/random_forest_text_handwriting_classification.ipynb
        - notebooks/sample_document_corpus_walkthrough.ipynb
        - notebooks/sample_corpus_sql_integrations.ipynb
        - notebooks/sample_corpus_train_test_pipeline.ipynb

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true

execute:
  eval: false
