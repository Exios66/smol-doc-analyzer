format:
  html:
    theme:
      light: [flatly, styles.scss]
      dark: [darkly, styles.scss]
    # Bundle CSS/JS/images into each page so figures work on Posit Cloud
    # and when HTML is viewed without sidecar asset folders.
    embed-resources: true
    toc: true
    toc-depth: 3
    toc-location: right
    toc-title: "On this page"
    number-sections: false
    code-copy: true
    code-overflow: wrap
    code-tools: true
    code-link: true
    code-fold: false
    code-block-bg: true
    code-block-border-left: "#0f766e"
    highlight-style: atom-one
    smooth-scroll: true
    link-external-newwindow: true
    link-external-icon: true
    fig-align: center
    fig-cap-location: bottom
    # Client-side Mermaid (no Chromium at render time — more reliable on Posit)
    mermaid:
      theme: neutral
    grid:
      sidebar-width: 275px
      body-width: 900px
      margin-width: 250px
    include-in-header:
      text: |
        <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

execute:
  eval: false
  echo: true
  warning: false
